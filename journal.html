<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Memory Journal 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
padding:50px 0;
overflow:hidden;
background:
linear-gradient(
to bottom,
#5b0000,
#2b0000,
#0d0d0d
);
font-family:'Nunito',sans-serif;
display:flex;
justify-content:center;
align-items:center;
position:relative;

}

/* ❤️ floating hearts */

.heart-bg{
position:absolute;
font-size:18px;
opacity:.15;
animation:floatHeart linear infinite;
pointer-events:none;
}

@keyframes floatHeart{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:.15;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* ✨ glow */

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,182,193,.08);
border-radius:50%;
filter:blur(100px);
top:-150px;
left:-150px;
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,215,0,.06);
border-radius:50%;
filter:blur(100px);
bottom:-150px;
right:-150px;
}

/* 📖 book */
.book-wrapper{
width:80%;
max-width:1100px;
height:90vh;

display:flex;
flex-direction:column;
justify-content:center;

margin:auto;
position:relative;
z-index:10;
}

.book-title{
text-align:center;
margin-bottom:20px;
}

.book-title h1{
font-family:'Pacifico';
font-size:38px;
color:#ffe3ea;
}

/* open book */

.book{
height:580px;
background:#efe2c4;
border-radius:18px;
display:flex;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.4);
position:relative;
}

/* center fold */

.book::after{
content:'';
position:absolute;
left:50%;
top:0;
width:8px;
height:100%;
transform:translateX(-50%);
background:
linear-gradient(
to right,
rgba(0,0,0,.15),
rgba(255,255,255,.1),
rgba(0,0,0,.15)
);
}

/* pages */

.page{
width:50%;
padding:40px;
position:relative;
background:
linear-gradient(
to bottom,
#f5ead0,
#eee1c1
);
}

/* paper texture */

.page::before{
content:'';
position:absolute;
inset:0;
background:
radial-gradient(
rgba(0,0,0,.03) 1px,
transparent 1px
);
background-size:10px 10px;
pointer-events:none;
}

/* page heading */

.memory-title{
font-family:'Pacifico';
font-size:24px;
color:#6d0000;
margin-bottom:15px;
text-align:center;
}

/* polaroid */

.polaroid{
background:white;
padding:12px 12px 45px;
width:80%;
margin:auto;
transform:rotate(-3deg);
box-shadow:0 8px 20px rgba(0,0,0,.15);
position:relative;
}

.polaroid img{
width:100%;
height:260px;
object-fit:cover;
filter:grayscale(100%);
transition:.4s;
}

.polaroid img:hover{
filter:grayscale(0%);
}

.caption{
margin-top:15px;
text-align:center;
font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
color:#7a0000;
font-size:14px;
}
.polaroid::before{
content:'';
position:absolute;
top:-12px;
left:50%;
transform:translateX(-50%) rotate(-3deg);
width:90px;
height:28px;
background:rgba(255,230,190,.8);
border:1px solid rgba(0,0,0,.08);
}

/* memory text */

.memory-text{
margin-top:25px;
font-size:16px;
line-height:1.8;
text-align:center;
font-family:'Cormorant Garamond',serif;
color:#4c2d20;
padding:0 15px;
}

/* scrapbook image */



.extra-img{
position:absolute;
top:15px;
right:15px;

width:90px;
height:90px;

object-fit:cover;

border-radius:10px;

box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.memory-icon{
position:absolute;
width:40px;
height:40px;
object-fit:contain;
opacity:.95;
}

.icon1{
bottom:30px;
left:25px;
}

.icon2{
bottom:50px;
right:25px;
}

.icon3{
top:120px;
right:35px;
}

.extra1{
top:20px;
right:20px;
}

.extra2{
bottom:20px;
left:20px;
}

/* doodles */

.doodle{
position:absolute;
font-size:28px;
opacity:.75;
}

.d1{
top:30px;
left:30px;
}

.d2{
bottom:35px;
right:35px;
}

.d3{
top:120px;
right:60px;
}
@keyframes floatSticker{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

/* controls */

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:18px;
}

.controls button{
padding:14px 28px;
border:none;
border-radius:40px;
cursor:pointer;
font-weight:700;
background:
linear-gradient(
to right,
#ffe0ea,
#ffb3c6
);
color:#6d0000;
font-size:16px;
}

#pageNumber{
color:#ffe0ea;
font-size:18px;
font-weight:700;
}

/* page flip */
.flip{
animation:bookFlip .7s ease;
}

@keyframes bookFlip{

0%{
transform:rotateY(0deg);
}

50%{
transform:rotateY(8deg);
}

100%{
transform:rotateY(0deg);
}

}

@media(max-width:900px){

.book{
flex-direction:column;
height:auto;
transform-style:preserve-3d;
transition:.6s;
}

.page{
width:100%;
}

.book::after{
display:none;
}

}
.back-btn{
position:fixed;
top:25px;
left:25px;
z-index:9999;

padding:12px 22px;

border:none;
border-radius:40px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);

color:#ffe0ea;
font-size:16px;
font-weight:700;

cursor:pointer;
transition:.3s;
}


</style>
</head>

let currentPage = 0;

const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

function createPage(memory){

return `

<div class="doodle d1">${memory.doodle.split(" ")[0]}</div>
<div class="doodle d2">${memory.doodle.split(" ")[1]}</div>
<div class="doodle d3">${memory.doodle.split(" ")[2]}</div>


<img src="${memory.extra}" class="extra-img extra1">

<img src="${memory.icon}" class="memory-icon icon1">



<div class="memory-title">
${memory.title}
</div>

<div class="polaroid">
<img src="${memory.image}">
<div class="caption">
${memory.caption}
</div>
</div>

<div class="memory-text">
${memory.text}
</div>

`;

}

function renderPages(){

leftPage.innerHTML =
createPage(memories[currentPage]);

rightPage.innerHTML =
createPage(memories[currentPage + 1]);

document.getElementById("pageNumber")
.innerHTML =
`📖 Page ${Math.floor(currentPage/2)+1} / 9`;

document.getElementById("book")
.classList.add("flip");

setTimeout(()=>{
document.getElementById("book")
.classList.remove("flip");
},600);

}

document.getElementById("nextBtn")
.addEventListener("click",()=>{

if(currentPage < memories.length - 2){

currentPage += 2;

createHeartBurst();

renderPages();

}

});

document.getElementById("prevBtn")
.addEventListener("click",()=>{

if(currentPage > 0){

currentPage -= 2;

createHeartBurst();

renderPages();

}

});

renderPages();
function createHeartBurst(){

for(let i=0;i<10;i++){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";

heart.style.left=
(window.innerWidth/2)+"px";

heart.style.top=
(window.innerHeight/2)+"px";

heart.style.fontSize="24px";

heart.style.pointerEvents="none";

heart.style.zIndex="999";

document.body.appendChild(heart);

let x=(Math.random()*300)-150;
let y=(Math.random()*300)-150;

heart.animate([

{
transform:"translate(0,0)",
opacity:1
},

{
transform:`translate(${x}px,${y}px)`,
opacity:0
}

],{
duration:1200
});

setTimeout(()=>{
heart.remove();
},1200);

}

}
document.getElementById("book")
.classList.add("flip");

setTimeout(()=>{

document.getElementById("book")
.classList.remove("flip");

},600);



</script>
